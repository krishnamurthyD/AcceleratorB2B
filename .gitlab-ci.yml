# include:
#   - local: 'ci/install-docker-image.yml'
#   - local: 'ci/sf_deploy.yml'
#   - local: 'ci/sf_validate.yml'

stages:
  - docker
  - checkout
  - select_org
  - authenticate
  - generate_delta
  - scan
  - deploy
  - validate

before_script:
  - echo "Starting GitLab pipeline"

# Build and Push Docker Image
kaniko-build:
  stage: docker
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - echo "Checking if image already exists in Docker Hub..."

    # Create Docker config.json for auth
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"username\":\"$DOCKER_USERNAME\",\"password\":\"$DOCKER_PWD\"}}}" > /kaniko/.docker/config.json

    # Check if image already exists
    - |
      if docker run --rm curlimages/curl:8.10.1 \
        curl -fsSL -u "$DOCKER_USERNAME:$DOCKER_PWD" \
        https://index.docker.io/v1/repositories/$DOCKER_USERNAME/salesforce-cli/tags/latest > /dev/null 2>&1; then
        echo "✅ Image already exists in Docker Hub. Skipping build."
        exit 0
      else
        echo "⏳ Image not found. Building and pushing..."
        /kaniko/executor \
          --context "$CI_PROJECT_DIR" \
          --dockerfile "$CI_PROJECT_DIR/Dockerfile" \
          --destination "docker.io/$DOCKER_USERNAME/salesforce-cli:latest" \
          --cache=true \
          --cache-repo="docker.io/$DOCKER_USERNAME/salesforce-cli-cache"
      fi
  rules:
    - changes:
        - Dockerfile
        - .gitlab-ci.yml
  only:
    - main



# Checkout source code
checkout_code:
  stage: checkout
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  services:
    - docker:dind
  script:
    - git fetch --unshallow || echo "Already shallow clone"
    - git checkout $CI_COMMIT_REF_NAME

# Selecting Target Org
select_target_org:
  stage: select_org
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  script:
    - cd $CI_PROJECT_DIR
    - echo "Selecting target org..."
    - chmod +x ./.gitlab/scripts/select_target_org.sh
    - ./.gitlab/scripts/select_target_org.sh "$CI_COMMIT_REF_NAME"
  artifacts:
    reports:
      dotenv: variables.env

authenticate_to_org:
  stage: authenticate
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  dependencies:
    - select_target_org
  script:
    - echo "Starting authentication job..."
    - echo "Installed Salesforce CLI version:"
    - sf --version
    - echo "Installed plugins:"
    - sf plugins
    - echo "Running authentication script..."
    - if [ ! -z "$ORG_ALIAS" ]; then
        sh .gitlab/scripts/authenticate-to-org.sh "$ORG_ALIAS" "auth_file.json";
      fi
    - echo "Authentication job finished."



# Create delta packages
generate_delta:
  stage: generate_delta
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  script:
    - ./.gitlab/actions/sf-generate-delta.sh "HEAD~1" "HEAD"

# Scan and Upload SARIF
scan_sarif:
  stage: scan
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  script:
    - ./.gitlab/actions/sf-code-scanner.sh || echo "Scan completed"

# Deploy Delta
deploy_delta:
  stage: deploy
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  dependencies:
    - authenticate_to_org
    - generate_delta
  script:
    - source variables.env
    - if [ ! -z "$ORG_ALIAS" ]; then
        ./.gitlab/actions/sf-deploy-delta.sh "$ORG_ALIAS";
      fi

# Validate Delta
validate_delta:
  stage: validate
  image: docker.io/$DOCKER_USERNAME/salesforce-cli:latest
  dependencies:
    - authenticate_to_org
    - generate_delta
  script:
    - source variables.env
    - if [ ! -z "$ORG_ALIAS" ]; then
        ./.gitlab/actions/sf-validate-delta.sh "$ORG_ALIAS";
      fi

# Trigger only on Merge Requests to main, qa, or uat
