variables:
  DOCKER_IMAGE: docker.io/$DOCKER_USERNAME/salesforce-cli:latest


# Checkout source code
checkout_code:
  stage: checkout
  image: $DOCKER_IMAGE
  services:
    - docker:dind
  script:
    - git fetch --unshallow || echo "Already shallow clone"
    - git checkout $CI_COMMIT_REF_NAME
  

# Selecting Target Org
select_target_org:
  stage: select_org
  image: $DOCKER_IMAGE
  script:
    - cd $CI_PROJECT_DIR
    - echo "Selecting target org..."
    - chmod +x ./.gitlab/scripts/select_target_org.sh
    - sh ./.gitlab/scripts/select_target_org.sh "$CI_COMMIT_REF_NAME"
  artifacts:
    reports:
      dotenv: variables.env
    paths:
      - auth_file.json

# Authenticate to SF Org
authenticate_to_org:
  stage: authenticate
  image: $DOCKER_IMAGE
  dependencies:
    - select_target_org
  script:
    - echo "Starting authentication job..."
    - echo "Installed Salesforce CLI version:"
    - sf --version
    - echo "Installed plugins:"
    - sf plugins
    - cd $CI_PROJECT_DIR
    - echo "Running authentication script..."
    - if [ ! -z "$ORG_ALIAS" ]; then
        sh .gitlab/scripts/authenticate-to-org.sh "$ORG_ALIAS" "auth_file.json";
      fi
    - echo "Authentication job finished."



# Create delta packages
generate_delta:
  stage: generate_delta
  image: $DOCKER_IMAGE
  script:
    - chmod +x .gitlab/scripts/sf-generate-delta.sh
    - sh .gitlab/scripts/sf-generate-delta.sh "HEAD~1" "HEAD"
  artifacts:
    paths:
      - changed-sources



# Scan and Upload SARIF
scan_sarif:
  stage: scan
  image: $DOCKER_IMAGE
  dependencies:
    - generate_delta
  script:
    - chmod +x .gitlab/scripts/sf-code-scanner.sh
    - sh ./.gitlab/scripts/sf-code-scanner.sh || echo "Scan completed"

# Deploy Delta
deploy_delta:
  stage: deploy
  image: $DOCKER_IMAGE
  dependencies:
    - select_target_org
    - authenticate_to_org
    - generate_delta
  script:
    - chmod +x .gitlab/scripts/sf-deploy-delta.sh
    - if [ ! -z "$ORG_ALIAS" ]; then
        ./.gitlab/scripts/sf-deploy-delta.sh "$ORG_ALIAS";
      fi


# Validate Delta
validate_delta:
  stage: validate
  image: $DOCKER_IMAGE
  dependencies:
    - select_target_org
    - authenticate_to_org
    - generate_delta
  script:
    - chmod +x .gitlab/scripts/sf-validate-delta.sh
    - echo "ORG_ALIAS = $ORG_ALIAS"
    - echo "$SF_AUTH_URL" > auth_file.json
    - if [ -n "$ORG_ALIAS" ]; then ./.gitlab/scripts/sf-validate-delta.sh "$ORG_ALIAS" "auth_file.json"; else echo "ORG_ALIAS is empty, skipping validation"; fi


