stages:
  - select

select-target-org:
  stage: select
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_REF_NAME == "main"'
    - if: '$CI_COMMIT_REF_NAME == "qa"'
    - if: '$CI_COMMIT_REF_NAME == "uat"'
  script: "./.gitlab/scripts/select_target_org.sh"
  artifacts:
    reports:
      dotenv: org_output.env
