stages:
  - delta

create-delta:
  stage: delta
  image: node:18   # Or custom image with Salesforce CLI + SGD plugin installed
  script:
    # Setup safe directory and clean workspace
    - export HOME=/root
    - git config --system --add safe.directory "$CI_PROJECT_DIR"
    - rm -rf changed-sources
    - mkdir changed-sources

    # Verify plugins
    - sf plugins

    # Generate delta package
    - sf sgd:source:delta \
        --to "$TO_BRANCH" \
        --from "$FROM_BRANCH" \
        --output changed-sources/ \
        --generate-delta \
        --source force-app/

    # Detect test classes
    - cd changed-sources
    - |
      test_classes=""
      for file in $(grep -rl '@isTest' . --include "*.cls" || true); do
        class_name=$(basename "$file" .cls)
        echo "Found test class: $class_name"
        if [ -n "$test_classes" ]; then
          test_classes="${test_classes} ${class_name}"
        else
          test_classes="${class_name}"
        fi
      done

      if [ -n "$test_classes" ]; then
        echo "Test classes found: $test_classes"
      else
        echo "No test classes found."
      fi

      # Save for next jobs
      echo "TEST_CLASSES=$test_classes" >> ../build.env
  artifacts:
    reports:
      dotenv: build.env   # makes TEST_CLASSES available to downstream jobs
  variables:
    # These will be passed by pipeline or set as defaults
    TO_BRANCH: "main"
    FROM_BRANCH: "develop"
