stages:
  - deploy

deploy:
  stage: deploy
  image: node:18   # Or an image with Salesforce CLI (sf) installed
  script:
    - echo "Starting deployment..."
    
    # Deploy normal source
    - |
      if [[ -d "changed-sources/force-app" ]]; then
        if [[ -z "$TEST_CLASSES" ]]; then
          echo "Deploying without test classes"
          sf project deploy start \
            --source-dir "changed-sources/force-app" \
            --target-org "$ORG_ALIAS" \
            --ignore-conflicts
        else
          echo "Deploying with test classes: $TEST_CLASSES"
          sf project deploy start \
            --source-dir "changed-sources/force-app" \
            --target-org "$ORG_ALIAS" \
            --test-level "$TEST_LEVEL" \
            -t "$TEST_CLASSES" \
            --ignore-conflicts
        fi
      fi

    # Deploy destructive changes
    - |
      if [[ -d "changed-sources/destructiveChanges" ]]; then
        echo "Deploying destructive changes..."
        sf project deploy start \
          --metadata-dir "changed-sources/destructiveChanges" \
          --purge-on-delete \
          --target-org "$ORG_ALIAS" \
          --ignore-conflicts
      fi
  variables:
    TEST_LEVEL: "RunSpecifiedTests"
    # ORG_ALIAS should be set via GitLab CI/CD Variables in project/group settings
    # TEST_CLASSES can be injected from a previous job or pipeline variable
