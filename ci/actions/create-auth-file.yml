stages:
  - select

select-target-org:
  stage: select
  image: node:18
  variables:
    SF_AUTH_DEMO: ""   # set this in GitLab CI/CD variables, not here
  script:
    - echo "Selecting target org..."
    - echo "$SF_AUTH_DEMO" > ./auth_file.json
    - echo "org-alias=DEMO" >> org_output.txt
    - echo "Target org alias set to DEMO"
  artifacts:
    reports:
      dotenv: org_output.txt   # exports variables for later jobs
