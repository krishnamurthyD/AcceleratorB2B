<template lwc:render-mode="light">
    <div class={alignmentClasses}>
        <span class={customPickerClasses}>
            <button
                class="main-button-controller"
                onclick={handleClick}
                variant={variant}
                size={size}
                data-automation="countryPickerButton"
                disabled={disabled}>
                <span class="button-content">
                    <lightning-icon
                        if:true={showGlobeIcon}
                        class={customIconClasses}
                        size={customIconSize}
                        src={iconPath}></lightning-icon>
                    <img if:true={flagUrl} src={flagUrl} alt={buttonCountry} style="margin-right: 0.5rem; vertical-align: middle; width: 20px; height: 15px;" />
                    {buttonLabelText}
                </span>
                <span>
                    <img src={iconToShow} alt="Dropdown" class="dropdown"/>
                </span>
            </button>
        </span>
    </div>
</template>
