<template>
    <div class="plp-trending slds-box slds-theme_default slds-m-vertical_medium">
        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
            <h3 class="slds-text-heading_small">Trending Now</h3>
            <a href="javascript:void(0);">View All</a>
        </div>
        <div class="slds-grid slds-gutters slds-scrollable_x" style="flex-wrap: nowrap;">
            <template for:each={products} for:item="prod">
                <div key={prod.id} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4" style="min-width: 200px;">
                    <div class="slds-box slds-box_x-small">
                        <!-- Placeholder Image -->
                        <div class="slds-image slds-m-bottom_small" style="height: 150px; background: #f3f3f3;"></div>
                        <p class="slds-text-body_regular slds-truncate">{prod.name}</p>
                        <p class="slds-text-title_bold">{prod.price}</p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
