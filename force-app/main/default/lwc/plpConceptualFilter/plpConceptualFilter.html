<template>
    <div class="plp-conceptual-filter slds-box slds-theme_default slds-m-vertical_medium">
        <h3 class="slds-text-heading_small slds-m-bottom_medium">Shop by Category</h3>
        <div class="slds-grid slds-gutters slds-wrap">
            <template for:each={categories} for:item="cat">
                <div key={cat.id} class="slds-col slds-size_1-of-2 slds-medium-size_1-of-4 slds-m-bottom_small">
                    <div class="category-card slds-box slds-box_x-small slds-text-align_center cursor-pointer" 
                         onclick={handleCategoryClick} 
                         data-id={cat.id}>
                        <lightning-icon icon-name={cat.icon} size="medium" class="slds-m-bottom_x-small"></lightning-icon>
                        <p class="slds-text-title_caps">{cat.label}</p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
